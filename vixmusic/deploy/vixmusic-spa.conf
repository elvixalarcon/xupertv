# VixMusic — SPA: recargar /buscar, /artistas, etc. sin error 404
<Directory /var/www/html/vixmusic/api>
    Options -Indexes +FollowSymLinks
    AllowOverride All
    Require all granted
</Directory>

<Directory /var/www/html/vixmusic>
    Options -Indexes +FollowSymLinks
    AllowOverride All
    Require all granted
    FallbackResource /vixmusic/index.html
</Directory>
