name: iOS IPA (VixMusic)

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - 'ios/**'
      - 'src/**'
      - '.github/workflows/ios-ipa.yml'

permissions:
  contents: write

jobs:
  build-ipa:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Build unsigned IPA
        run: |
          chmod +x ios/build-ipa-unsigned.sh
          ios/build-ipa-unsigned.sh

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: VixMusic-unsigned-ipa
          path: data/ipa/VixMusic-unsigned.ipa
          retention-days: 30

      - name: Publish IPA to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(node -p "require('./data/ipa/versions.json').versionName")
          TAG="ios-v${VERSION}"
          gh release view "$TAG" >/dev/null 2>&1 && \
            gh release upload "$TAG" data/ipa/VixMusic-unsigned.ipa data/ipa/versions.json --clobber || \
            gh release create "$TAG" data/ipa/VixMusic-unsigned.ipa data/ipa/versions.json \
              --title "VixMusic iOS ${VERSION}" \
              --notes "IPA sin firmar (Capacitor). Instalar con eSign, AltStore o Sideloadly."
