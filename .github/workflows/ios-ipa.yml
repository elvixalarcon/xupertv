# Compila IPA nativo SwiftUI sin firmar (GitHub Actions macOS).
# Xcode 16 + weak_framework SwiftUICore: compatible con iOS 17 (framework solo en iOS 18+).
name: iOS IPA (unsigned)

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - 'ios/**'
      - '.github/workflows/ios-ipa.yml'

permissions:
  contents: write

jobs:
  build-ipa:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build unsigned IPA
        run: |
          xcodebuild -version
          chmod +x ios/build-ipa-unsigned.sh
          ios/build-ipa-unsigned.sh

      - name: Verify SwiftUICore is weak-linked (iOS 17 OK)
        run: |
          unzip -q data/ipa/VixTV.ipa -d /tmp/vix-ipa-check
          BIN=/tmp/vix-ipa-check/Payload/App.app/App
          otool -L "$BIN" | tee /tmp/vix-otool.txt
          if otool -l "$BIN" | grep -A3 LC_LOAD_WEAK_DYLIB | grep -q SwiftUICore; then
            echo "OK: SwiftUICore weak-linked"
          elif ! strings "$BIN" | grep -q 'SwiftUICore.framework/SwiftUICore'; then
            echo "OK: no SwiftUICore reference"
          else
            echo "ERROR: SwiftUICore appears strongly linked — will crash on iOS 17"
            exit 1
          fi
          ls -lh data/ipa/VixTV.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: VixTV-unsigned-ipa
          path: data/ipa/VixTV.ipa
          retention-days: 30

      - name: Publish IPA to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(grep -m1 'MARKETING_VERSION = ' ios/App/App.xcodeproj/project.pbxproj | sed 's/.*= //;s/;//;s/ //g')
          TAG="ios-v${VERSION}"
          gh release view "$TAG" >/dev/null 2>&1 && \
            gh release upload "$TAG" data/ipa/VixTV.ipa data/ipa/versions.json --clobber || \
            gh release create "$TAG" data/ipa/VixTV.ipa data/ipa/versions.json \
              --title "Vix TV iOS ${VERSION}" \
              --notes "IPA sin firmar generado por GitHub Actions. Firmar en servidor o con eSign."
