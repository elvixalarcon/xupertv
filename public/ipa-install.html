<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Vix TV">
  <link rel="apple-touch-icon" href="/icons/icon-192.svg">
  <title>Instalar Vix TV</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, sans-serif;
      background: #07070d;
      color: #eee;
      padding: 24px;
      text-align: center;
    }
    .box { max-width: 420px; }
    h1 { color: #f5c518; font-size: 1.5rem; margin: 0 0 12px; }
    p { color: #aaa; line-height: 1.5; margin: 0 0 16px; }
    .btn {
      display: inline-block;
      padding: 16px 28px;
      border-radius: 12px;
      background: #007aff;
      color: #fff;
      font-weight: 700;
      font-size: 1.1rem;
      text-decoration: none;
      border: none;
    }
    .btn-secondary {
      display: inline-block;
      margin-top: 14px;
      color: #6cf;
      font-size: .95rem;
    }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="box">
    <h1>📺 Instalar Vix TV</h1>
    <p id="msg">Preparando instalación…</p>
    <a class="btn hidden" id="btn-install" href="#">Instalar</a>
    <a class="btn-secondary" id="btn-fallback" href="/descargar#iphone">Volver a descargas</a>
  </div>
  <script>
    (function () {
      const base = location.origin.replace(/\/$/, '');
      const manifestUrl = base + '/ipa/manifest.plist';
      const installUrl = 'itms-services://?action=download-manifest&url=' + encodeURIComponent(manifestUrl);
      const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);
      const btn = document.getElementById('btn-install');
      const msg = document.getElementById('msg');

      btn.href = installUrl;

      if (isIOS) {
        msg.textContent = 'Safari abrirá el asistente de instalación de iOS.';
        btn.textContent = 'Instalar Vix TV';
        btn.classList.remove('hidden');
        window.location.replace(installUrl);
      } else {
        msg.textContent = 'Abre este enlace en Safari en tu iPhone o iPad para instalar.';
        btn.textContent = 'Enlace de instalación (solo iOS)';
        btn.classList.remove('hidden');
      }
    })();
  </script>
</body>
</html>
